services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hostelhub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - java_angular_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hostelhub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-java:
    build:
      context: .
      dockerfile: docker/api-java.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hostelhub}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-}
      DB_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_SECRET_FILE: ${JWT_SECRET_FILE:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      EXPOSE_DEV_RESET_URL: ${EXPOSE_DEV_RESET_URL:-false}
      APP_PORT: 8080
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web-angular:
    build:
      context: .
      dockerfile: docker/web-angular.Dockerfile
    depends_on:
      api-java:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  java_angular_pgdata:
