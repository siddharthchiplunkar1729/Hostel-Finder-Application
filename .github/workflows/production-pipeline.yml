name: Java Angular CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: hostelhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/hostelhub_test
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: ci_test_secret_ci_test_secret_ci
      CORS_ALLOWED_ORIGINS: http://localhost:4200

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hostelhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hostelhub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Spring Boot API
        run: mvn -f apps/api-java/pom.xml -B package

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Angular dependencies
        run: npm --prefix apps/web-angular ci

      - name: Build Angular app
        run: npm --prefix apps/web-angular run build

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-build
      - frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api-java.Dockerfile -t hostelhub-api:ci .

      - name: Build Web image
        run: docker build -f docker/web-angular.Dockerfile -t hostelhub-web:ci .

  deploy-ready:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deployment summary
        run: echo "Build, frontend bundle, and Docker images are ready. Deploy with docker-compose.java-angular.yml or extend this job with your target environment secrets."
